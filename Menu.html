<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Queen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f3f3f3; margin: 0; padding: 10px; padding-bottom: 80px;}
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 10px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 80px; height: 80px; object-fit: contain; }
        /* Кнопки */
        .controls { display: flex; justify-content: center; align-items: center; height: 40px; margin-top: 10px; }
        .btn { border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-add-big { background: #31b545; width: 100%; height: 100%; }
        .btn-small { width: 40px; height: 40px; }
        .btn-minus { background: #e64d44; margin-right: 10px; }
        .btn-plus { background: #31b545; margin-left: 10px; }
        .count { font-size: 16px; font-weight: bold; width: 20px; }
        /* Главная кнопка ТГ */
        #main-btn { display: none; position: fixed; bottom: 20px; left: 5%; width: 90%; background: #31b545; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid" id="menu">
        </div>

    <button id="main-btn" onclick="sendOrder()">Просмотр заказа ($<span id="total-price">0</span>)</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        // Твои товары
        const items = [
            { id: 'pizza', name: 'Пицца Маргарита', price: 12, img: 'URL_ТВОЕЙ_КАРТИНКИ_ПИЦЦЫ.png' },
            { id: 'burger', name: 'Бургер Квин', price: 8, img: 'URL_ТВОЕЙ_КАРТИНКИ_БУРГЕРА.png' }
        ];

        let order = {};

        function renderMenu() {
            const menu = document.getElementById('menu');
            menu.innerHTML = '';
            
            items.forEach(item => {
                const count = order[item.id] ? order[item.id].count : 0;
                
                let controlsHtml = '';
                if (count === 0) {
                    controlsHtml = `<button class="btn btn-add-big" onclick="changeCount('${item.id}', 1)">+</button>`;
                } else {
                    controlsHtml = `
                        <button class="btn btn-small btn-minus" onclick="changeCount('${item.id}', -1)">-</button>
                        <span class="count">${count}</span>
                        <button class="btn btn-small btn-plus" onclick="changeCount('${item.id}', 1)">+</button>
                    `;
                }

                menu.innerHTML += `
                    <div class="card">
                        <img src="${item.img}" alt="${item.name}">
                        <p style="margin: 5px 0; font-weight: bold;">${item.name} · $${item.price}</p>
                        <div class="controls">${controlsHtml}</div>
                    </div>
                `;
            });
            updateMainButton();
        }

        function changeCount(id, delta) {
            const item = items.find(i => i.id === id);
            if (!order[id]) order[id] = { name: item.name, price: item.price, count: 0 };
            
            order[id].count += delta;
            if (order[id].count <= 0) delete order[id];
            
            renderMenu();
        }

        function updateMainButton() {
            let total = 0;
            for (let key in order) {
                total += order[key].price * order[key].count;
            }
            const btn = document.getElementById('main-btn');
            if (total > 0) {
                btn.style.display = 'block';
                document.getElementById('total-price').innerText = total;
            } else {
                btn.style.display = 'none';
            }
        }

        function sendOrder() {
            // Отправляем данные обратно в бота
            tg.sendData(JSON.stringify(order)); 
        }

        renderMenu();
    </script>
</body>
</html>
